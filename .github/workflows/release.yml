name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create zip
        run: |
          mkdir -p dist build/mworago-vip-feed
          rsync -a --exclude=".git*" --exclude=".github" --exclude="dist" --exclude="build" ./ build/mworago-vip-feed/
          cd build && zip -r ../dist/mworago-vip-feed.zip mworago-vip-feed

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/mworago-vip-feed.zip
          generate_release_notes: false
